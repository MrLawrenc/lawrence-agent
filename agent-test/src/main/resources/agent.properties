jdbc.enable=true
jdbc.scan-packages=com.github,com.hahah
jdbc.driver-classes=org.h2.Driver,com.mysql.cj.jdbc.NonRegisteringDriver

servlet.enable=true
servlet.version=3
servlet.scanPackages=com.github

log.level=info

# 全局输出配置（适用于所有 Monitor）
# 可选值：CONSOLE / FILE / JSON，可逗号分隔同时启用多个，如 CONSOLE,JSON
output.mode=CONSOLE,JSON
# mode 为 FILE 或 BOTH 时的输出文件路径
output.file=agent-output.log

# 方法耗时链路监控
timing.enable=true
# 需要监控的包路径前缀（逗号分隔）
timing.packages=com.lawrence.test.javassist._03
# 额外排除的包（可选，框架包已默认排除）
timing.exclude-packages=